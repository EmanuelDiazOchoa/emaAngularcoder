<div class="navbar">
  <button mat-icon-button class="menu-btn" (click)="toggleSidenav.emit()" aria-label="Toggle menu">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="nav-title">Sistema de Gestión Académica</span>

  <span class="spacer"></span>

  @if (user$ | async; as user) {
    <div class="user-info">
      <mat-icon>account_circle</mat-icon>
      <span>{{ user.nombre }} <span class="role-label">({{ user.rol }})</span></span>
    </div>
  }

  <div class="nav-actions">
    @if (isAdmin$ | async) {
      <button mat-button class="btn-usuarios" routerLink="/dashboard/usuarios" routerLinkActive="active">
        <mat-icon>people</mat-icon>
        <span class="btn-label">Usuarios</span>
      </button>
    }

    @if (isLogged$ | async) {
      <button mat-button class="btn-logout" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span class="btn-label">Salir</span>
      </button>
    } @else {
      <button mat-flat-button class="btn-login" routerLink="/login">
        <mat-icon>login</mat-icon>
        Login
      </button>
    }
  </div>
</div>
