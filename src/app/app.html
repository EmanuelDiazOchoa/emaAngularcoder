@if (showLayout) {
  <div class="app-shell">
    <header class="app-header">
      <h1>🎓 Centro de Estudiantes</h1>
    </header>

    <mat-sidenav-container class="sidenav-container">
      <mat-sidenav #drawer [mode]="(isHandset$ | async) ? 'over' : 'side'" [opened]="!(isHandset$ | async)">
        <app-sidebar></app-sidebar>
      </mat-sidenav>

      <mat-sidenav-content>
        <app-navbar (toggleSidenav)="drawer.toggle()"></app-navbar>
        <div class="main-content">
          <router-outlet></router-outlet>
        </div>
        <footer class="app-footer">
          <p>© 2025 Centro de Estudiantes</p>
          <p>Desarrollado con Angular 19 + NgRx</p>
        </footer>
      </mat-sidenav-content>
    </mat-sidenav-container>
  </div>
} @else {
  <router-outlet></router-outlet>
}
